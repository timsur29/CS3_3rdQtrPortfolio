<!DOCTYPE html>
<html>
    <head>
        <title>View Signups (Q3 G2)</title>
        <link rel="stylesheet" href="./styleindex.css">
    </head>
    <body>
        <h1>View Club Signups</h1><br>

        <form>
            <select name="Select Your Club: " id="filter" required>
                <option value="all">All</option>
                <option value="Alianti">Alianti</option>
                <option value="Alyabo">Alyabo</option>
                <option value="Exposure">Exposure</option>
                <option value="SARS+">SARS+</option>
                <option value="Sightlines">Sightlines</option>
            </select>
        </form>

        <table id="tab">
            <thead>
                <th>Student ID</th>
                <th>Full Name</th>
                <th>Date of Birth</th>
                <th>Student Email</th>
                <th>Mobile Phone Number</th>
                <th>Grade Level</th>
                <th>Intern/Extern Status</th>
                <th>Preferred Organization</th>
            </thead>
            <tbody>

            </tbody>
        </table><br><br>

        <a href="./Q3_2nd3rdGraded.html">Back to Club Signups</a>
    </body>

    <script>
        //get stored data
        const key = "signups";
        const existing = JSON.parse(localStorage.getItem(key));

        createTable("all");

        filter = document.getElementById("filter");

        filter.addEventListener('change', () => createTable(filter.value));

        function createTable(tabmode) {
            const tab = document.getElementById("tab");
            const tbody = tab.querySelector("tbody");
            while (tbody.firstChild) {
                tbody.removeChild(tbody.firstChild);
            }

            if (tabmode == "all") {
                for (let i=0; i<existing.length; i++) {
                    row = tbody.insertRow()
                    keylist = Object.keys(existing[i])
                    for (let j=0; j<8; j++) {
                        cell = row.insertCell(j);
                        cell.textContent = existing[i][keylist[j]];
                    }
                }
            }

            if (tabmode == "Alianti") {
                for (let i=0; i<existing.length; i++) {
                    if (existing[i].club == "Alianti") {
                        row = tbody.insertRow()
                        keylist = Object.keys(existing[i])
                        for (let j=0; j<8; j++) {
                            cell = row.insertCell(j);
                            cell.textContent = existing[i][keylist[j]];
                        }
                    }
                }
            }

            if (tabmode == "Alyabo") {
                for (let i=0; i<existing.length; i++) {

                        row = tbody.insertRow()

                        for (let j=0; j<8; j++) {
                            cell = row.insertCell(j);
                            cell.textContent = existing[i][keylist[j]];
                        }
                    }
                }
            }

            if (tabmode == "Exposure") {
                for (let i=0; i<existing.length; i++) {
                    if (existing[i].club == "Exposure") {
                        row = tbody.insertRow()
                        keylist = Object.keys(existing[i])
                        for (let j=0; j<8; j++) {
                            cell = row.insertCell(j);
                            cell.textContent = existing[i][keylist[j]];
                        }
                    }
                }
            }

            if (tabmode == "SARS+") {
                for (let i=0; i<existing.length; i++) {
                    if (existing[i].club == "SARS+") {
                        row = tbody.insertRow()
                        keylist = Object.keys(existing[i])
                        for (let j=0; j<8; j++) {
                            cell = row.insertCell(j);
                            cell.textContent = existing[i][keylist[j]];
                        }
                    }
                }
            }

            if (tabmode == "Sightlines") {
                for (let i=0; i<existing.length; i++) {
                    if (existing[i].club == "Sightlines") {
                        row = tbody.insertRow()
                        keylist = Object.keys(existing[i])
                        for (let j=0; j<8; j++) {
                            cell = row.insertCell(j);
                            cell.textContent = existing[i][keylist[j]];
                        }
                    }
                }
            }


        }

    </script>
</html>
